name: Build & Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  build-icd:
    name: Build ICD (macOS)
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v5
      with:
        persist-credentials: false
    - name: Install deps
      run: brew install cmake vulkan-headers
    - name: Configure
      run: mkdir build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cd build && make -j$(sysctl -n hw.ncpu)
    - name: Run unit tests
      run: cd build && ctest --output-on-failure
    - name: Package ICD artifact
      run: |
        mkdir -p dist/icd
        cp build/libMetalVRBridge.dylib dist/icd/
        cp vulkan_icd.json dist/icd/
        perl -0pi -e 's@\@rpath/libMetalVRBridge\.dylib@./libMetalVRBridge.dylib@g' dist/icd/vulkan_icd.json
        ls -lh dist/icd
    - name: Upload ICD artifact
      uses: actions/upload-artifact@v4
      with:
        name: metalvr-bridge-icd
        path: dist/icd
        if-no-files-found: error
        retention-days: 14
  build-launcher:
    name: Build Launcher App (macOS)
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v5
      with:
        persist-credentials: false
    - name: Build launcher bundle
      run: |
        cd launcher
        bash setup.sh
    - name: Upload launcher artifact
      uses: actions/upload-artifact@v4
      with:
        name: metalvr-launcher
        path: |
          launcher/MetalVR Bridge.app
          launcher/MetalVR-Bridge-Installer.zip
        if-no-files-found: error
        retention-days: 14
