name: Build & Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-icd:
    name: Build ICD (macOS)
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Install deps
      run: brew install cmake vulkan-headers
    - name: Configure
      run: mkdir build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release
    - name: Build
      run: cd build && make -j$(sysctl -n hw.ncpu)
    - name: Check
      run: ls -lh build/libMetalVRBridge.dylib
  build-launcher:
    name: Build Launcher App (macOS)
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Build launcher
      run: |
        cd launcher
        swiftc -o MetalVRBridge -framework SwiftUI -framework Metal -framework AppKit -framework CoreGraphics -target arm64-apple-macos13.0 -O MetalVRBridgeApp.swift ContentView.swift BridgeViewModel.swift
    - name: Bundle
      run: |
        cd launcher
        mkdir -p "MetalVR Bridge.app/Contents/MacOS"
        cp MetalVRBridge "MetalVR Bridge.app/Contents/MacOS/"
        echo "Launcher bundle created"
